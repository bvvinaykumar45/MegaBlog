<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 320"
  fill="none"
>
  <defs>
    <style>
      .monogram {
        font-family: "Kaisei Decol", serif;
        font-size: 320px;
        fill: rgba(17, 24, 39, 0.18);
      }

      .wordmark {
        font-family: "Carattere", cursive;
        font-size: 150px;
        fill: #111827;
      }

      .rule {
        stroke: #111827;
        stroke-width: 3;
      }
    </style>
  </defs>

  <text
    x="600"
    y="195"
    text-anchor="middle"
    dominant-baseline="middle"
    class="monogram"
  >
    MB
  </text>

  <line x1="190" y1="200" x2="265" y2="200" class="rule" />
  <line x1="940" y1="200" x2="1020" y2="200" class="rule" />

  <text
    x="600"
    y="170"
    text-anchor="middle"
    dominant-baseline="middle"
    class="wordmark"
  >
    Mega Blog
  </text>

</svg>